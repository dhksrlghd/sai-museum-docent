<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="사이 SAI — 작품과 당신 사이를 잇다">
  <defs>
    <style><![CDATA[
      .bg { fill: #faf8f3; }
      .ink { fill: #15110a; }
      .ink-soft { fill: #3d362b; }
      .ink-faint { fill: #6b6356; }
      .vermilion { fill: #a0301a; }
      .vermilion-stroke { stroke: #a0301a; }
      .hanja {
        font-family: "Noto Serif KR", "Nanum Myeongjo", "Apple SD Gothic Neo", "Malgun Gothic", serif;
        font-weight: 700;
      }
      .latin {
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 0.35em;
      }
      .label {
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }
    ]]></style>
  </defs>

  <!-- 한지 베이스 -->
  <rect class="bg" width="1280" height="360"/>

  <!-- 위·아래 단청 적색 가는 선 (절제된 박물관 가이드 라인) -->
  <line class="vermilion-stroke" x1="80" y1="64" x2="1200" y2="64" stroke-width="1"/>
  <line class="vermilion-stroke" x1="80" y1="296" x2="1200" y2="296" stroke-width="1"/>

  <!-- 좌상단 작은 라벨 -->
  <text class="latin ink-faint" x="80" y="50" font-size="11">N A T I O N A L &#160; M U S E U M &#160; · &#160; A I &#160; D O C E N T</text>

  <!-- 사  이 — 글자 사이 큰 공백 (브랜드 컨셉의 시각화) -->
  <text class="hanja ink" x="200" y="200" font-size="180">사</text>
  <text class="hanja ink" x="900" y="200" font-size="180">이</text>

  <!-- 정중앙 단청 적색 점 — "in-between" 의 중심 -->
  <circle class="vermilion" cx="640" cy="160" r="8"/>

  <!-- 부제 (한국어) -->
  <text class="hanja ink-soft" x="200" y="252" font-size="28" letter-spacing="2">작품과 당신 사이를 잇다</text>

  <!-- 부제 (영문) -->
  <text class="latin ink-faint" x="200" y="280" font-size="13">B E T W E E N &#160; Y O U &#160; A N D &#160; K O R E A N &#160; A R T</text>

  <!-- 우측 하단 메타 -->
  <text class="label ink-faint" x="1200" y="332" font-size="11" text-anchor="end">RAG · 멀티모달 · 박물관 컴패니언</text>
</svg>
