<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="사이 SAI — 작품과 당신 사이를 잇다">
  <defs>
    <style><![CDATA[
      .bg { fill: #faf8f3; }
      .ink { fill: #15110a; }
      .ink-soft { fill: #3d362b; }
      .ink-faint { fill: #6b6356; }
      .vermilion { fill: #a0301a; }
      .vermilion-stroke { stroke: #a0301a; }
      .hanja {
        font-family: "Noto Serif KR", "Nanum Myeongjo", "Apple SD Gothic Neo", "Malgun Gothic", serif;
        font-weight: 700;
      }
      .latin {
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 0.42em;
      }
      .label {
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }
    ]]></style>
  </defs>

  <!-- 한지 베이스 -->
  <rect class="bg" width="1280" height="360"/>

  <!-- 상단 라벨 (위로 끌어올림: y=42) -->
  <text class="latin ink-faint" x="640" y="42" font-size="11" text-anchor="middle">B E T W E E N &#160; Y O U &#160; A N D &#160; K O R E A N &#160; A R T</text>

  <!-- 사 — 연결선 — 이 -->
  <!-- 사/이 폰트 160 → 140 으로 줄이고 baseline y=200 → 230 으로 내려서 라벨과 충분한 여백 확보 -->
  <text class="hanja ink" x="430" y="230" font-size="140" text-anchor="middle">사</text>
  <line class="vermilion-stroke" x1="510" y1="195" x2="770" y2="195" stroke-width="1.2"/>
  <circle class="vermilion" cx="640" cy="195" r="4"/>
  <text class="hanja ink" x="850" y="230" font-size="140" text-anchor="middle">이</text>

  <!-- 부제 (한국어) — y=290 -->
  <text class="hanja ink-soft" x="640" y="290" font-size="22" letter-spacing="3" text-anchor="middle">작품과 당신 사이를 잇다</text>

  <!-- 하단 메타 — y=326 -->
  <text class="label ink-faint" x="640" y="326" font-size="10" letter-spacing="2" text-anchor="middle">RAG · MULTIMODAL · 국립중앙박물관 도슨트</text>
</svg>
